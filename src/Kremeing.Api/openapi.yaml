openapi: 3.1.0
info:
  title: Kremeing
  version: 0.2.0
  summary: Hot-light tracking for every Krispy Kreme location in the US.
  description: |
    Public read API for the Krispy Kreme hot-light status of every US store.

    Backed by a poller that hits Krispy Kreme's official store API every five
    minutes and records *flip events* — the moments a store's hot light goes
    on or off. Clients get both the live snapshot and a historical view they
    can render as uptime graphs or trend heatmaps.

    The API only stores changes plus a "last polled at" sentinel, so each
    store's footprint stays tiny while the staleness of the data remains
    observable.

servers:
  - url: http://localhost:5234
    description: Local dev (in-memory or Postgres-backed depending on KREMEING_DATABASE_URL)

tags:
  - name: live
    description: Live status sourced directly from Krispy Kreme.
  - name: history
    description: Flip events and uptime aggregations from our local store.
  - name: discovery
    description: Find stores by location.
  - name: push
    description: Web-push subscription management (Phase 2 + 3).
  - name: meta
    description: Service metadata.

paths:
  /health:
    get:
      tags: [meta]
      summary: Liveness probe
      responses:
        '200':
          description: Service is up.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  stores:
                    type: integer
                    description: |
                      Number of stores in the current discovery registry.
                      A value stuck at 0 indicates discovery failed and the
                      poller has nothing to poll — alert on it.
                    example: 345
                  lastDiscoveryRefresh:
                    type: string
                    format: date-time
                    description: |
                      When the registry was last (re)published by discovery.
                      Stale relative to the configured refresh interval means
                      refreshes are failing.

  /stores/nearby:
    get:
      tags: [discovery]
      summary: Find stores near a coordinate
      description: |
        Proxies Krispy Kreme's `/shops` endpoint and enriches each entry
        with our cached temporal context (`lastFlippedAt`, `firstObservedAt`).
        Upstream caps the result at 12 — `limit` only narrows further.

        Responses are cached for ~30s, keyed on coordinates quantized to
        ~1 km resolution. Rate-limited at 60 req/min per client IP
        (token bucket, shared with `/hot-light`).
      parameters:
        - in: query
          name: lat
          required: true
          schema: { type: number, format: double, minimum: -90, maximum: 90 }
          example: 47.6062
        - in: query
          name: lng
          required: true
          schema: { type: number, format: double, minimum: -180, maximum: 180 }
          example: -122.3321
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 12 }
      responses:
        '200':
          description: Nearby stores with current hot-light status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NearbyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'
        '502':
          $ref: '#/components/responses/UpstreamUnavailable'

  /stores/search:
    get:
      tags: [discovery]
      summary: Find stores by zip or "City, ST"
      description: |
        Free-text proxy over Krispy Kreme's `/shops/search?cityStateZip=`.
        Accepts a 5-digit ZIP (`98109`) or a `"City, ST"` (`"Seattle, WA"`)
        — both shapes are normalized upstream.

        Responses are cached for ~30s, keyed on the lowercased,
        whitespace-trimmed query (so `"Seattle, WA"` and `"seattle, wa"`
        share an entry). Same 60 req/min/IP token bucket as `/nearby`
        and `/hot-light`.
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string, minLength: 1, maxLength: 100 }
          example: '98109'
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 12 }
      responses:
        '200':
          description: Stores matching the query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'
        '502':
          $ref: '#/components/responses/UpstreamUnavailable'

  /stores/{id}/hot-light:
    get:
      tags: [live]
      summary: Current hot-light status for one store
      description: |
        Live read backed by a 60-second in-process cache, so a hot link
        getting passed around won't translate into hundreds of requests
        per second against `api.krispykreme.com`. Use this for "is the
        light on right now" UIs; for graphs and trends, use `/uptime`.

        Rate-limited at 60 req/min per client IP (token bucket, shared
        with `/nearby`).
      parameters:
        - $ref: '#/components/parameters/StoreId'
      responses:
        '200':
          description: Status snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotLightStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/StoreNotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '502':
          $ref: '#/components/responses/UpstreamUnavailable'

  /stores/{id}/history:
    get:
      tags: [history]
      summary: Flip events for one store within a time range
      description: |
        Returns every status flip we observed for the store inside the range,
        oldest first. The first entry per store is a `FirstObservation`
        anchor (when we started tracking), not a real flip — pair entries
        sequentially to reconstruct intervals.

        Defaults to the last 7 days if `since`/`until` are omitted.
      parameters:
        - $ref: '#/components/parameters/StoreId'
        - in: query
          name: since
          schema: { type: string, format: date-time }
          description: Inclusive lower bound (ISO-8601 with offset).
        - in: query
          name: until
          schema: { type: string, format: date-time }
          description: |
            Exclusive upper bound. The total span (`until - since`)
            must be ≤ 90 days; wider ranges return `range_too_wide`.
          description: Exclusive upper bound (ISO-8601 with offset).
      responses:
        '200':
          description: Flip events within the range.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotLightHistory'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/StoreNotFound'

  /vapid-public-key:
    get:
      tags: [push]
      summary: VAPID public key for the web-push subscription flow
      description: |
        Returns the URL-safe-base64 public key the browser must include
        in `pushManager.subscribe({ applicationServerKey: ... })`. The
        matching private key never leaves the server. Returns 503
        `push_disabled` when the operator hasn't configured push
        (no Postgres + VAPID env vars).
      responses:
        '200':
          description: Public key.
          content:
            application/json:
              schema:
                type: object
                required: [publicKey]
                properties:
                  publicKey:
                    type: string
                    description: URL-safe base64 of the 65-byte uncompressed P-256 public key.
                    example: BDtAWmA4Cjqc5RB8AxJPOf66DaYviPYwmRiW2EkZbEH7AUggXcVBvyKUXoJTCH0IcgesIsxa3Ava7QxJCv_U3i4
        '503':
          $ref: '#/components/responses/PushDisabled'

  /subscriptions:
    get:
      tags: [push]
      summary: Stores this browser is currently subscribed to
      description: |
        Pass the browser's `pushManager.getSubscription().endpoint`. The
        server returns every storeId this endpoint has an active row
        for. Used by the web client on app load to restore per-store
        bell state.
      parameters:
        - in: query
          name: endpoint
          required: true
          schema: { type: string, format: uri }
      responses:
        '200':
          description: Array of storeIds (possibly empty).
          content:
            application/json:
              schema:
                type: object
                required: [endpoint, storeIds]
                properties:
                  endpoint: { type: string, format: uri }
                  storeIds:
                    type: array
                    items: { type: integer }
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/PushDisabled'
    post:
      tags: [push]
      summary: Subscribe a browser push endpoint to a store's hot-light flips
      description: |
        Body matches the JSON shape of the browser's
        `PushSubscription.toJSON()`. Idempotent on
        `(storeId, subscription.endpoint)`; re-posting refreshes the
        keys (handles browser key rotation).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
      responses:
        '201':
          description: Subscription stored (or refreshed).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscribeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/PushDisabled'
    delete:
      tags: [push]
      summary: User-initiated unsubscribe
      description: |
        Removes the row matching `(storeId, endpoint)`. Idempotent —
        no row matching the criteria is treated as a successful
        no-op. Use this when the user toggles "Notify me" off in the
        UI; let 410-Gone bounce cleanup handle dead subscriptions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnsubscribeRequest'
      responses:
        '204':
          description: Subscription removed (or already absent).
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/PushDisabled'

  /device-subscriptions:
    post:
      tags: [push]
      summary: Register a native device (FCM) for nearby hot-light alerts
      description: |
        Used by the Android Auto companion app. The device asks to be
        notified whenever a store within `radiusMiles` of its
        (`latitude`, `longitude`) flips its hot light on. Idempotent on
        the FCM `token`: re-posting refreshes the stored location/radius
        (handles the device moving or rotating its token).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceSubscribeRequest'
      responses:
        '201':
          description: Device registered (or refreshed).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceSubscribeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/PushDisabled'
    delete:
      tags: [push]
      summary: Unregister a native device
      description: |
        Removes the row matching the FCM `token`. Idempotent — a missing
        token is treated as a successful no-op.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceUnsubscribeRequest'
      responses:
        '204':
          description: Device removed (or already absent).
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/PushDisabled'

  /stores/{id}/uptime:
    get:
      tags: [history]
      summary: Bucketed uptime data for charting
      description: |
        Aggregates the flip log into time-series buckets. `observedSeconds`
        may be less than `totalSeconds` when poll gaps exist — clients
        should render those gaps as unknown rather than as 0% uptime.

        Defaults: bucket=hour, range=last 24h (or last 30d when bucket=day).
      parameters:
        - $ref: '#/components/parameters/StoreId'
        - in: query
          name: bucket
          schema:
            type: string
            enum: [hour, day]
            default: hour
        - in: query
          name: since
          schema: { type: string, format: date-time }
        - in: query
          name: until
          schema: { type: string, format: date-time }
          description: |
            Exclusive upper bound. The total span (`until - since`)
            must be ≤ 90 days; wider ranges return `range_too_wide`.
      responses:
        '200':
          description: Uptime buckets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UptimeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/StoreNotFound'

components:
  parameters:
    StoreId:
      in: path
      name: id
      required: true
      description: Krispy Kreme `shopId` (positive integer).
      schema:
        type: integer
        minimum: 1
      example: 899

  responses:
    BadRequest:
      description: |
        Malformed request — query param missing/wrong type, invalid path
        id, out-of-range coordinates, or `until - since > 90 days`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    StoreNotFound:
      description: No store exists with that `shopId` (live), or we've never observed it (history).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: |
        Too many requests from this client IP. The proxy endpoints
        (`/stores/nearby`, `/stores/{id}/hot-light`) share a token bucket
        of 60 req/min per IP. Honor the `Retry-After` header (seconds).
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UpstreamUnavailable:
      description: The Krispy Kreme upstream API failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    PushDisabled:
      description: |
        Push notifications are not configured on this server (no
        Postgres + VAPID env). Clients can fall back to in-page
        polling when they see this.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    HotLightStatusValue:
      type: string
      enum: [on, off, unknown]
      description: Wire encoding of the live status. Always lowercase ASCII.

    HotLightStatus:
      type: object
      required: [storeId, status, observedAt]
      properties:
        storeId: { type: integer, example: 899 }
        status:  { $ref: '#/components/schemas/HotLightStatusValue' }
        observedAt:
          type: string
          format: date-time
          description: When the response was generated, not necessarily when the light flipped.

    NearbyQuery:
      type: object
      required: [latitude, longitude, limit]
      properties:
        latitude:  { type: number, format: double }
        longitude: { type: number, format: double }
        limit:     { type: integer }

    NearbyStore:
      type: object
      required: [id, name, address, latitude, longitude, distanceMiles, currentStatus]
      properties:
        id:             { type: integer, example: 899 }
        name:           { type: string,  example: "Krispy Kreme Seattle - 1st Ave South" }
        address:        { type: string,  example: "1900 1st Ave S, Seattle, WA 98134" }
        latitude:       { type: number,  format: double }
        longitude:      { type: number,  format: double }
        distanceMiles:  { type: number,  format: double }
        currentStatus:  { $ref: '#/components/schemas/HotLightStatusValue' }
        lastFlippedAt:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
          description: Null until a flip is observed; `firstObservedAt` is set first.
        firstObservedAt:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
          description: Null when the store has never been observed by us.

    NearbyResponse:
      type: object
      required: [query, stores]
      properties:
        query:  { $ref: '#/components/schemas/NearbyQuery' }
        stores:
          type: array
          items: { $ref: '#/components/schemas/NearbyStore' }

    SearchQuery:
      type: object
      required: [q, limit]
      properties:
        q:     { type: string }
        limit: { type: integer }

    SearchResponse:
      type: object
      required: [query, stores]
      properties:
        query:  { $ref: '#/components/schemas/SearchQuery' }
        stores:
          type: array
          items: { $ref: '#/components/schemas/NearbyStore' }

    SubscriptionKeys:
      type: object
      required: [p256dh, auth]
      properties:
        p256dh: { type: string, description: ECDH P-256 public key, URL-safe base64. }
        auth:   { type: string, description: Auth secret, URL-safe base64. }

    WebPushSubscription:
      type: object
      required: [endpoint, keys]
      properties:
        endpoint:
          type: string
          format: uri
          description: |
            Push service URL the browser hands us when calling
            `pushManager.subscribe()`. Different per browser
            (FCM, Mozilla autopush, Apple web-push, etc.).
        keys: { $ref: '#/components/schemas/SubscriptionKeys' }

    SubscribeRequest:
      type: object
      required: [storeId, subscription]
      properties:
        storeId:      { type: integer, minimum: 1 }
        subscription: { $ref: '#/components/schemas/WebPushSubscription' }

    SubscribeResponse:
      type: object
      required: [id, storeId]
      properties:
        id:      { type: integer, format: int64 }
        storeId: { type: integer }

    UnsubscribeRequest:
      type: object
      required: [storeId, endpoint]
      properties:
        storeId:  { type: integer, minimum: 1 }
        endpoint: { type: string, format: uri }

    DeviceSubscribeRequest:
      type: object
      required: [token, platform, latitude, longitude, radiusMiles]
      properties:
        token:
          type: string
          description: FCM registration token identifying this device install.
        platform:
          type: string
          enum: [android]
        latitude:    { type: number, format: double, minimum: -90,  maximum: 90 }
        longitude:   { type: number, format: double, minimum: -180, maximum: 180 }
        radiusMiles:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Notify about hot-light flips within this many miles of the point.

    DeviceSubscribeResponse:
      type: object
      required: [id, radiusMiles]
      properties:
        id:          { type: integer, format: int64 }
        radiusMiles: { type: number,  format: double }

    DeviceUnsubscribeRequest:
      type: object
      required: [token]
      properties:
        token: { type: string }

    HotLightFlip:
      type: object
      required: [storeId, status, observedAt]
      properties:
        storeId:    { type: integer, example: 899 }
        status:     { $ref: '#/components/schemas/HotLightStatusValue' }
        observedAt: { type: string, format: date-time }

    HotLightHistory:
      type: object
      required: [storeId, rangeStart, rangeEnd, flips]
      properties:
        storeId:    { type: integer }
        rangeStart: { type: string, format: date-time }
        rangeEnd:   { type: string, format: date-time }
        flips:
          type: array
          items: { $ref: '#/components/schemas/HotLightFlip' }

    UptimeBucket:
      type: object
      required: [startUtc, endUtc, onSeconds, offSeconds, observedSeconds, totalSeconds, fractionOn]
      properties:
        startUtc:        { type: string, format: date-time }
        endUtc:          { type: string, format: date-time }
        onSeconds:       { type: number, format: double }
        offSeconds:      { type: number, format: double }
        observedSeconds: { type: number, format: double }
        totalSeconds:    { type: number, format: double }
        fractionOn:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: |
            On-seconds divided by *observed* seconds (not total). Use
            `observedSeconds / totalSeconds` to detect partial coverage.

    UptimeResponse:
      type: object
      required: [storeId, bucket, rangeStart, rangeEnd, buckets]
      properties:
        storeId:    { type: integer }
        bucket:
          type: string
          enum: [hour, day]
        rangeStart: { type: string, format: date-time }
        rangeEnd:   { type: string, format: date-time }
        buckets:
          type: array
          items: { $ref: '#/components/schemas/UptimeBucket' }

    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          enum:
            - store_not_found
            - upstream_unavailable
            - invalid_store_id
            - missing_query_param
            - invalid_bucket
            - invalid_coordinate
            - invalid_query
            - invalid_range
            - range_too_wide
            - rate_limited
            - push_disabled
            - invalid_subscription
            - invalid_device_subscription
            - not_found
          description: Stable machine-readable error code.
        message:
          type: string
          description: Human-readable explanation. May change between releases.
