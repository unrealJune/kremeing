name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish (e.g. v0.2.0). Must already exist in git.'
        required: true

permissions:
  contents: read
  packages: write     # required to push to GHCR

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9a-zA-Z.-]+)?$ ]]; then
            echo "::error::version '$VERSION' is not vMAJOR.MINOR.PATCH[-prerelease]"
            exit 1
          fi
          STRIPPED="${VERSION#v}"
          # GHCR paths must be lowercase even when the org/repo isn't.
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "version=$VERSION"     >> "$GITHUB_OUTPUT"
          echo "stripped=$STRIPPED"   >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$REPO_LC" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ver.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Multi-arch so the image runs on both x86_64 nodes (most
          # cloud k8s) and arm64 (Graviton, M-series local clusters).
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.ver.outputs.image }}:${{ steps.ver.outputs.version }}
            ${{ steps.ver.outputs.image }}:${{ steps.ver.outputs.stripped }}
            ${{ steps.ver.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.stripped }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## Published"
            echo ""
            echo "| Tag | Pull |"
            echo "|---|---|"
            for t in "${{ steps.ver.outputs.version }}" "${{ steps.ver.outputs.stripped }}" "latest"; do
              echo "| \`$t\` | \`docker pull ${{ steps.ver.outputs.image }}:$t\` |"
            done
          } >> "$GITHUB_STEP_SUMMARY"
