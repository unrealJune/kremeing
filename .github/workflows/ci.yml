name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    # Real Postgres for the Kremeing.Postgres.Tests project. The same
    # KREMEING_TEST_DATABASE_URL shape devs use locally.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kremeing_test
          POSTGRES_USER: kremeing
          POSTGRES_PASSWORD: kremeing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kremeing -d kremeing_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      KREMEING_TEST_DATABASE_URL: "Host=localhost;Port=5432;Database=kremeing_test;Username=kremeing;Password=kremeing;Pooling=false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          # Allow preview/RC versions if 10.0 is still in those channels.
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore Kremeing.slnx

      - name: Build
        run: dotnet build Kremeing.slnx --no-restore -c Release

      - name: Test
        run: |
          dotnet test Kremeing.slnx \
            --no-build -c Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults

  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest ships kubectl preinstalled. Client-side dry-run
      # validates against the bundled API schema — no cluster needed.
      - name: Validate k8s manifests
        run: |
          set -e
          for f in k8s/*.yaml; do
            # Skip *.example.* files; they hold placeholder values.
            case "$f" in
              *example*) continue ;;
            esac
            echo "==> $f"
            kubectl apply --dry-run=client -f "$f"
          done

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Smoke build only — we don't push from CI. The release workflow
      # is the single source of truth for what lands in GHCR.
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: kremeing:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
