name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    # Real Postgres for the Kremeing.Postgres.Tests project. The same
    # KREMEING_TEST_DATABASE_URL shape devs use locally.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kremeing_test
          POSTGRES_USER: kremeing
          POSTGRES_PASSWORD: kremeing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kremeing -d kremeing_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      KREMEING_TEST_DATABASE_URL: "Host=localhost;Port=5432;Database=kremeing_test;Username=kremeing;Password=kremeing;Pooling=false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          # Allow preview/RC versions if 10.0 is still in those channels.
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore Kremeing.slnx

      - name: Build
        run: dotnet build Kremeing.slnx --no-restore -c Release

      - name: Test
        run: |
          dotnet test Kremeing.slnx \
            --no-build -c Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults

  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # `kubectl --dry-run=client` still tries to download the API server's
      # OpenAPI schema for validation, which fails in CI without a cluster.
      # kubeconform validates against bundled, version-pinned schemas —
      # purpose-built for this workflow.
      - name: Install kubeconform
        run: |
          set -e
          VERSION="0.6.7"
          curl -fsSL -o kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/v${VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Validate k8s manifests
        run: |
          set -e
          # Skip *example* templates — they hold CHANGEME placeholder values.
          mapfile -t files < <(ls k8s/*.yaml | grep -v example)
          echo "validating: ${files[*]}"
          kubeconform \
            -strict \
            -summary \
            -kubernetes-version 1.30.0 \
            -schema-location default \
            "${files[@]}"

  android-logic:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # The :logic module is pure Kotlin/JVM (no Android SDK needed) and holds
      # all the app's decision logic + its JUnit suite. :app is intentionally
      # not included here (opt-in via -PbuildAndroidApp; needs the Android SDK
      # and Google Maven).
      - name: Test Android logic
        working-directory: android
        run: ./gradlew :logic:test --no-daemon --console=plain

      - name: Upload Android logic test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-logic-test-results
          path: android/logic/build/reports/tests/test

  # Layer 1 of the Android UX tests: Robolectric runs the :app shell's
  # car-screen / notification / activity tests on the JVM (no emulator). This
  # needs the Android SDK + Google Maven, both available on GitHub-hosted
  # runners, so it builds :app via the -PbuildAndroidApp opt-in.
  android-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Robolectric UX tests for :app
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest -PbuildAndroidApp=true --no-daemon --console=plain

      - name: Upload :app unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-app-test-results
          path: android/app/build/reports/tests/testDebugUnitTest

  # Builds a sideloadable APK so you can install the app straight from a CI
  # run. assembleDebug signs with the standard Android debug keystore, so the
  # resulting app-debug.apk installs on any device/emulator without extra
  # signing config. It's built with -PkremeingPushEnabled=false so it's a
  # "notificationless" APK: since there's no google-services.json here,
  # Firebase/FCM can't initialize and fetching a push token would otherwise
  # fail with "Couldn't get a push token". With push disabled the companion
  # screen skips the token/subscribe flow, and everything else (the Android
  # Auto UX, polling KREMEING_BASE_URL) works. Download the
  # "kremeing-app-debug-apk" artifact from the run's summary page and
  # `adb install` it (or open it on-device).
  android-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug -PbuildAndroidApp=true -PkremeingPushEnabled=false --no-daemon --console=plain

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kremeing-app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  # Layer 2: the thin Espresso smoke test on a real emulator. It's slower and
  # flakier than the Robolectric suite, so it's opt-in (manual dispatch) and
  # non-blocking (continue-on-error) — it never gates the PR pipeline.
  android-instrumented:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    strategy:
      matrix:
        api-level: [34]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          working-directory: android
          script: ./gradlew :app:connectedDebugAndroidTest -PbuildAndroidApp=true --no-daemon --console=plain

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumented-test-results
          path: android/app/build/reports/androidTests/connected

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Smoke build only — we don't push from CI. The release workflow
      # is the single source of truth for what lands in GHCR.
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: kremeing:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
