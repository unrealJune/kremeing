# API deployment: serves HTTP only, no poller. Safe to scale horizontally —
# every replica reads from the same Postgres backing store, and only the
# poller deployment writes observations.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kremeing-api
  namespace: kremeing
  labels:
    app.kubernetes.io/name: kremeing
    app.kubernetes.io/component: api
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: kremeing
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kremeing
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: kremeing:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KREMEING_ROLE
              value: api
            - name: KREMEING_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kremeing-database
                  key: url
            - name: ASPNETCORE_URLS
              value: http://0.0.0.0:8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            # Discovery scrapes ~50 site.krispykreme.com pages on startup.
            # Generous initial delay so the liveness probe doesn't kill
            # the pod mid-bootstrap.
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kremeing-api
  namespace: kremeing
  labels:
    app.kubernetes.io/name: kremeing
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kremeing
    app.kubernetes.io/component: api
  ports:
    - port: 80
      targetPort: http
      name: http
