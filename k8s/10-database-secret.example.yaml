# Template — copy to 10-database-secret.yaml, replace CHANGEME, then apply.
#
# Two fields:
#   - `url` is what the API and Poller pods read (KREMEING_DATABASE_URL).
#   - `postgres-password` is what the in-cluster Postgres pod (20-postgres.yaml)
#     uses to bootstrap. Skip this field if you're pointing at a managed DB.
#
# The two values MUST agree on the password. For managed Postgres, set
# `url` only and delete this Secret's reference from 20-postgres.yaml.

apiVersion: v1
kind: Secret
metadata:
  name: kremeing-database
  namespace: kremeing
type: Opaque
stringData:
  url: postgres://kremeing:CHANGEME@kremeing-postgres:5432/kremeing
  postgres-password: CHANGEME
