# Template — copy to 20-push-secret.yaml, replace CHANGEME, then apply.
# OPTIONAL: only needed if you enable push notifications.
#
# Two independent push transports, each optional:
#
#   Web Push (browser / PWA in web/) — VAPID keys:
#     - vapid-public-key   → KREMEING_VAPID_PUBLIC_KEY
#     - vapid-private-key  → KREMEING_VAPID_PRIVATE_KEY  (secret)
#     - vapid-subject      → KREMEING_VAPID_SUBJECT      (mailto: or origin URL)
#
#   Native push (Android Auto app via Firebase Cloud Messaging):
#     - fcm-project-id     → KREMEING_FCM_PROJECT_ID
#     - fcm-access-token   → KREMEING_FCM_ACCESS_TOKEN   (secret, short-lived)
#
# The FCM access token is a short-lived OAuth2 bearer minted from a Firebase
# service account. In production, refresh it out-of-band (a sidecar or CronJob
# that re-mints and patches this Secret) rather than pasting a static value.
#
# After creating this Secret, uncomment the matching env blocks in
# 30-api.yaml (subscription endpoints) and 40-poller.yaml (sends on flip).

apiVersion: v1
kind: Secret
metadata:
  name: kremeing-push
  namespace: kremeing
type: Opaque
stringData:
  vapid-public-key: CHANGEME
  vapid-private-key: CHANGEME
  vapid-subject: mailto:ops@example.com
  fcm-project-id: CHANGEME
  fcm-access-token: CHANGEME
