<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FBFAF8" />
  <title>Hot Now — Krispy Kreme Locator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght,wdth@8..144,300..900,75..125&display=swap" />

  <!-- Leaflet (real pannable map) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #F4F2EE;
      font-family: "Roboto Flex", "Roboto", system-ui, -apple-system, sans-serif;
      color: #1B1B1B;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }
    #root { position: fixed; inset: 0; overflow: hidden; }
    button { -webkit-tap-highlight-color: transparent; font-family: inherit; }

    /* ── Animations ──────────────────────────────────────────────────── */
    @keyframes pin-pulse {
      0%   { transform: translate(-50%, -50%) scale(0.6); opacity: 0.85; }
      100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
    }
    @keyframes dial-glow {
      0%, 100% { filter: brightness(1); }
      50%      { filter: brightness(1.18); }
    }
    @keyframes sheet-rise {
      from { transform: translateY(110%); }
      to   { transform: translateY(0); }
    }
    @keyframes sheet-fall {
      from { transform: translateY(0);    opacity: 1; }
      to   { transform: translateY(110%); opacity: 0; }
    }
    @keyframes overlay-fade-out {
      from { opacity: 1; }
      to   { opacity: 0; transform: translateY(8px); }
    }

    /* Honor users who request reduced motion: kill the looping pulses
       and the glow throb, keep the sheet entrance/exit (single short
       transitions, no looping) so layout still feels continuous. */
    @media (prefers-reduced-motion: reduce) {
      .kk-pin-halo,
      .kk-userdot-pulse,
      .kk-glow-dot {
        animation: none !important;
      }
    }

    /* ── Leaflet container styling ──────────────────────────────────── */
    .leaflet-container { background: #F4F2EE; font-family: inherit; }
    .leaflet-control-attribution {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(6px);
      font-size: 10px;
    }
    .leaflet-bar a { background: #FBFAF8; color: #1B1B1B; }
    .leaflet-bar a:hover { background: #EEECEA; }

    /* ── Custom map markers (HTML built in pins.jsx & map.jsx) ─────── */
    .kk-pin-icon, .kk-userdot-icon {
      background: transparent !important;
      border: none !important;
    }
    .kk-pin {
      position: relative;
      width: 100%; height: 100%;
    }
    .kk-pin-halo {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: none;
      animation: pin-pulse 2.6s cubic-bezier(0.2, 0.9, 0.3, 1.05) infinite;
    }
    .kk-pin-core {
      position: absolute;
      left: 50%; top: 50%;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: transform 220ms cubic-bezier(0.2, 0.9, 0.3, 1.05);
    }
    .kk-pin-flame { display: inline-flex; }
    .kk-pin-dot { display: inline-block; border-radius: 50%; }

    .kk-userdot {
      position: relative;
      width: 100%; height: 100%;
    }
    .kk-userdot-pulse {
      position: absolute;
      left: 50%; top: 50%;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(52,120,246,0.35) 0%, transparent 70%);
      animation: pin-pulse 3s ease-out infinite;
    }
    .kk-userdot-core {
      position: absolute;
      left: 50%; top: 50%;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #3478F6;
      border: 3px solid #FBFAF8;
      box-shadow: 0 0 0 6px rgba(52,120,246,0.18), 0 4px 10px rgba(0,0,0,0.15);
      transform: translate(-50%, -50%);
    }

    /* ── Layout: phone-first; ≥600px constrains UI to a centered column ─ */
    /* z-indexes sit above Leaflet's controls (1000) and panes (≤700) */
    .app-top-bar {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      left: 12px; right: 12px;
      z-index: 1500;
    }
    .app-bottom-sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 1600;
      border-top-left-radius: 28px;
      border-top-right-radius: 28px;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 28px);
    }
    .app-overlay {
      position: fixed;
      inset: 0;
      z-index: 1700;
    }

    @media (min-width: 600px) {
      .app-top-bar {
        left: 0; right: 0; margin: 0 auto;
        width: calc(100% - 32px);
        max-width: 460px;
      }
      .app-bottom-sheet {
        left: 0; right: 0; margin: 0 auto;
        width: calc(100% - 32px);
        max-width: 460px;
        bottom: 16px;
        border-radius: 28px;
        overflow: hidden;
        padding-bottom: 28px;
      }
      .app-overlay {
        top: 16px; bottom: 16px;
        left: 0; right: 0; margin: 0 auto;
        width: calc(100% - 32px);
        max-width: 460px;
        border-radius: 28px;
        overflow: hidden;
      }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="stores.js"></script>
  <script src="uptime-utils.js"></script>
  <!-- Service worker: registered as soon as the page loads so push
       payloads route to /sw.js even before React mounts. Failures are
       non-fatal (older browsers, file:// origins, etc.). -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .catch(err => console.warn('[kremeing] SW registration failed:', err));
      });
    }
  </script>
  <script type="text/babel" src="m3-tokens.jsx"></script>
  <script type="text/babel" src="pins.jsx"></script>
  <script type="text/babel" src="map.jsx"></script>
  <script type="text/babel" src="islands.jsx"></script>

  <script type="text/babel">
    const FALLBACK_CENTER = { lat: 40.7589, lng: -73.9851 }; // Times Square

    // Parse `?store=N&lat=&lng=` once at module init. When a share link
    // includes all three, we honor the sender's view: skip geolocation,
    // center the map there, and pre-select the shared store as soon as
    // the nearby fetch returns it.
    const SHARED = (() => {
      const p = new URLSearchParams(window.location.search);
      const id  = parseInt(p.get('store'), 10);
      const lat = parseFloat(p.get('lat'));
      const lng = parseFloat(p.get('lng'));
      if (Number.isFinite(id) && Number.isFinite(lat) && Number.isFinite(lng)) {
        return { id, lat, lng };
      }
      return null;
    })();

    function App() {
      const scheme = window.M3_SCHEMES.light;
      const [center, setCenter] = React.useState(
        SHARED ? { lat: SHARED.lat, lng: SHARED.lng } : FALLBACK_CENTER);
      const [userPos, setUserPos] = React.useState(null);
      const [locating, setLocating] = React.useState(SHARED == null);
      const [searching, setSearching] = React.useState(false);
      const [stores, setStores] = React.useState([]);
      const [error, setError] = React.useState(null);
      const [selected, setSelected] = React.useState(SHARED ? SHARED.id : null);
      const [listOpen, setListOpen] = React.useState(false);
      // The set of store IDs this browser is *already* subscribed to.
      // BottomSheet reads this on mount to start in 'subscribed' state
      // instead of 'idle' when the user has previously enabled push for
      // that store. Updated by subscribe/unsubscribe operations.
      const [subscribedStoreIds, setSubscribedStoreIds] =
        React.useState(() => new Set());
      // ── On mount: ask the server which stores this browser is
      //    already subscribed to and seed the set so BottomSheets
      //    open in the right state.
      React.useEffect(() => {
        let cancelled = false;
        (async () => {
          try {
            const ids = await window.KREMEING_API.listSubscribedStores();
            if (!cancelled) setSubscribedStoreIds(new Set(ids));
          } catch (_e) {
            // 503 push_disabled / unsupported — start empty, that's fine.
          }
        })();
        return () => { cancelled = true; };
      }, []);

      const onSubscribed = React.useCallback((storeId) => {
        setSubscribedStoreIds(prev => {
          if (prev.has(storeId)) return prev;
          const next = new Set(prev);
          next.add(storeId);
          return next;
        });
      }, []);

      const onUnsubscribed = React.useCallback((storeId) => {
        setSubscribedStoreIds(prev => {
          if (!prev.has(storeId)) return prev;
          const next = new Set(prev);
          next.delete(storeId);
          return next;
        });
      }, []);

      // Locate-button state: 'idle' | 'locating' | 'located' | 'denied'.
      // SHARED links bypass geolocation entirely (we want the sender's
      // view, not the recipient's) so we start in 'idle' there too.
      const [locateState, setLocateState] = React.useState('idle');

      // Tracks the center the most recent /stores/nearby fetch was
      // anchored on, so map-pan refetches can compare and only fire
      // for genuinely-new viewports.
      const lastFetchCenterRef = React.useRef({ lat: center.lat, lng: center.lng });
      const moveDebounceRef = React.useRef(null);

      // Locate handler used by both the gesture-less auto-attempt on
      // mount and the explicit "locate me" button. iOS Safari will not
      // show the permission prompt for gesture-less calls — and worse,
      // a gesture-less failure used to flip the button into 'denied',
      // disabling it before the user ever got a chance to tap. The
      // `interactive` flag is the gating mechanism: only a real user
      // gesture can move the button into 'locating' or 'denied'.
      // Auto-locate successes still update userPos/center/locateState
      // because that's strictly progress, not regression.
      const locateMe = React.useCallback((interactive) => {
        if (!navigator.geolocation) {
          if (interactive) setLocateState('denied');
          setLocating(false);
          return;
        }
        if (interactive) setLocateState('locating');
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const c = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            setUserPos(c);
            lastFetchCenterRef.current = c;
            setCenter(c);
            setLocateState('located');
            setLocating(false);
          },
          (err) => {
            setLocating(false);
            if (!interactive) return;   // keep the button tappable
            setLocateState(
              err && err.code === err.PERMISSION_DENIED ? 'denied' : 'idle');
          },
          { timeout: 10_000, maximumAge: 60_000 }
        );
      }, []);

      // ── Best-effort auto-locate on mount. iOS Safari does more than
      //    silently fail gesture-less getCurrentPosition calls — the
      //    request can stay pending indefinitely (the `timeout` option
      //    is effectively ignored without a gesture), and a subsequent
      //    gesture-driven call from the locate button gets interfered
      //    with so neither callback fires and the button stays stuck
      //    in 'locating' (greyed out). To avoid that, we only fire the
      //    gesture-less call when the Permissions API tells us
      //    geolocation is already 'granted'. Otherwise we skip and
      //    wait for the user to tap the button, which preserves a
      //    clean gesture for iOS Safari's prompt.
      React.useEffect(() => {
        if (SHARED) { setLocating(false); return; }
        if (!navigator.geolocation) { setLocating(false); return; }
        if (!navigator.permissions || !navigator.permissions.query) {
          setLocating(false);
          return;
        }
        let cancelled = false;
        navigator.permissions.query({ name: 'geolocation' })
          .then((status) => {
            if (cancelled) return;
            if (status.state === 'granted') {
              locateMe(false);
            } else {
              setLocating(false);
            }
          })
          .catch(() => { if (!cancelled) setLocating(false); });
        return () => { cancelled = true; };
      }, [locateMe]);

      // ── /stores/nearby fetcher. Pulled out so both the initial-load
      //    effect and the user-pan handler can call it without going
      //    through setCenter (which would round-trip into map.panTo
      //    and cause the animation loop).
      const fetchNearbyAt = React.useCallback((lat, lng) => {
        let cancelled = false;
        setError(null);
        window.KREMEING_API.fetchNearbyStores(lat, lng)
          .then((s) => {
            if (cancelled) return;
            setStores(s);
            setError(null);
            lastFetchCenterRef.current = { lat, lng };
          })
          .catch((err) => {
            if (cancelled) return;
            console.warn('[kremeing] /stores/nearby failed:', err.message);
            if (window.KREMEING_USE_MOCKS) {
              setStores(window.MOCK_STORES);
            } else {
              setStores([]);
              setError(err.message || 'Could not load nearby stores');
            }
          });
        return () => { cancelled = true; };
      }, []);

      // ── Initial load + programmatic recenters (geolocate, search,
      //    share-link arrival). User pans don't change `center` so
      //    they don't trigger this effect, which is what breaks the
      //    pan→setCenter→panTo flicker loop.
      React.useEffect(() => {
        return fetchNearbyAt(center.lat, center.lng);
      }, [center.lat, center.lng, fetchNearbyAt]);

      // ── Map pan/zoom: refetch /stores/nearby for the new viewport
      //    *without* updating `center` — that would round-trip back
      //    through map.panTo and cause flicker. Distance threshold is
      //    crude L1 in degrees: ≈5 km on lat, ≈4 km on lng — loose
      //    enough that finger-jitter doesn't fire, tight enough that
      //    panning across a metro area refreshes results.
      const onViewChange = React.useCallback((c) => {
        const last = lastFetchCenterRef.current;
        const moved = Math.abs(c.lat - last.lat) > 0.05
                   || Math.abs(c.lng - last.lng) > 0.05;
        if (!moved) return;
        if (moveDebounceRef.current) clearTimeout(moveDebounceRef.current);
        moveDebounceRef.current = setTimeout(() => {
          fetchNearbyAt(c.lat, c.lng);
        }, 350);
      }, [fetchNearbyAt]);

      // ── Search by ZIP or "City, ST" via /stores/search.
      const onSearch = React.useCallback(async (q) => {
        setSearching(true);
        setError(null);
        try {
          const results = await window.KREMEING_API.searchStores(q);
          setStores(results);
          if (results.length > 0) {
            const first = results[0];
            // Pre-stamp lastFetchCenterRef so the upcoming map pan
            // (triggered by setCenter below) doesn't fire its own
            // refetch — we already have the results.
            lastFetchCenterRef.current = { lat: first.latitude, lng: first.longitude };
            setCenter({ lat: first.latitude, lng: first.longitude });
            setSelected(first.id);
          } else {
            setSelected(null);
          }
        } catch (err) {
          console.warn('[kremeing] /stores/search failed:', err.message);
          setError(`No results for "${q}"`);
        } finally {
          setSearching(false);
        }
      }, []);

      // ── Uptime fetch — same gating: real errors stay errors unless
      //    the page explicitly asked for mocks.
      const fetchUptimeBuckets = React.useCallback(async (storeId, bucket) => {
        try {
          return await window.KREMEING_API.fetchUptime(storeId, bucket);
        } catch (err) {
          console.warn(`[kremeing] /stores/${storeId}/uptime failed:`, err.message);
          if (window.KREMEING_USE_MOCKS) return window.mockUptime(storeId, bucket);
          return [];
        }
      }, []);

      // ── Raw flip history — powers the scrubbable today timeline,
      //    the 90-day pill grid, and the "usually on" overlay.
      //    Returns the raw flip list, or null on failure so the
      //    BottomSheet can fall back to bucket-aggregated rendering.
      const fetchHistoryFlips = React.useCallback(async (storeId, sinceIso, untilIso) => {
        try {
          return await window.KREMEING_API.fetchHistory(storeId, sinceIso, untilIso);
        } catch (err) {
          console.warn(`[kremeing] /stores/${storeId}/history failed:`, err.message);
          if (window.KREMEING_USE_MOCKS) return window.mockHistory(storeId, sinceIso, untilIso);
          return null;
        }
      }, []);

      const hotCount = stores.filter((s) => s.currentStatus === 'on').length;
      const selectedStore = stores.find((s) => s.id === selected);

      const onSelect = React.useCallback((id) => {
        setSelected((cur) => (cur === id ? null : id));
      }, []);

      // While a sheet or full-screen overlay is open, the map + top bar
      // become non-interactive — `inert` keeps tab focus, screen readers,
      // and pointer events out of the underlying content.
      const sheetOpen = selectedStore != null;
      const overlayOpen = listOpen;
      const underlayInert = sheetOpen || overlayOpen;

      return (
        <div style={{
          position: 'fixed', inset: 0,
          color: scheme.onSurface, background: scheme.surface,
        }}>
          <div inert={underlayInert ? true : undefined} style={{ position: 'absolute', inset: 0 }}>
            <MapView
              stores={stores}
              scheme={scheme}
              selected={selected}
              onSelect={onSelect}
              center={center}
              userPos={userPos}
              onViewChange={onViewChange}
            />

            <TopAppBar
              hotCount={hotCount}
              scheme={scheme}
              onOpenList={() => setListOpen(true)}
              onSearch={onSearch}
              locating={locating}
              searching={searching}
              error={error}
            />

            <LocateButton
              scheme={scheme}
              state={locateState}
              onLocate={() => locateMe(true)}
            />
          </div>

          {sheetOpen && (
            <BottomSheet
              key={selectedStore.id}
              store={selectedStore}
              scheme={scheme}
              onClose={() => setSelected(null)}
              fetchUptimeBuckets={fetchUptimeBuckets}
              fetchHistoryFlips={fetchHistoryFlips}
              initiallySubscribed={subscribedStoreIds.has(selectedStore.id)}
              onSubscribed={onSubscribed}
              onUnsubscribed={onUnsubscribed}
            />
          )}

          {overlayOpen && (
            <StoreList
              stores={stores}
              scheme={scheme}
              onClose={() => setListOpen(false)}
              onPick={(id) => { setListOpen(false); setSelected(id); }}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
